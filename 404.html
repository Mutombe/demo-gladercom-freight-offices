<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gladercom Freight</title>
  <script>
    // SPA 404 redirect: stash the path so main.jsx can rehydrate the deep route
    try {
      sessionStorage.setItem('gladercom:spa-redirect', location.pathname + location.search + location.hash);
    } catch (e) { /* ignore */ }
    location.replace('/');
  </script>
</head>
<body></body>
</html>
